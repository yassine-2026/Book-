<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 eBook Generator</title>
    <style>
        body{background:#0a0a0a;color:#fff;font-family:Arial;padding:20px;text-align:center}
        .container{max-width:600px;margin:0 auto}
        h1{color:#8b5cf6;font-size:2.5em}
        input,select,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;font-size:1em}
        input,select{background:#000;color:#fff;border:1px solid #333}
        button{background:#8b5cf6;color:#fff;border:none;font-weight:bold;cursor:pointer}
        button:disabled{background:#333}
        .result{display:none;background:#111;padding:20px;border-radius:10px;margin-top:20px;text-align:right}
        .chapter{background:#000;padding:10px;margin:5px 0;border-radius:5px;border-right:3px solid #8b5cf6}
        .loading{display:none;color:#ffaa00;padding:20px}
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 eBook Generator</h1>
        <input type="text" id="topic" placeholder="موضوع الكتاب...">
        <select id="genre">
            <option value="educational">تعليمي</option>
            <option value="story">قصص</option>
            <option value="technology">تقنية</option>
            <option value="business">أعمال</option>
            <option value="science">علوم</option>
        </select>
        <select id="language">
            <option value="arabic">العربية</option>
            <option value="english">English</option>
        </select>
        <input type="number" id="chapters" value="5" min="3" max="10">
        <button id="btn" onclick="generate()">📚 إنشاء الكتاب</button>
        <div class="loading" id="loading">⏳ جاري الإنشاء...</div>
        <div class="result" id="result">
            <h2 id="title"></h2>
            <div id="chapters"></div>
        </div>
    </div>
    <script>
        async function generate(){
            const topic=document.getElementById('topic').value.trim();
            if(!topic)return alert('اكتب موضوع');
            const btn=document.getElementById('btn');
            btn.disabled=true;
            document.getElementById('loading').style.display='block';
            document.getElementById('result').style.display='none';
            try{
                const r=await fetch('/api/generate-book',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic,genre:document.getElementById('genre').value,language:document.getElementById('language').value,chapters:parseInt(document.getElementById('chapters').value)})});
                const d=await r.json();
                if(!d.success)throw new Error(d.error);
                document.getElementById('title').textContent=d.title;
                document.getElementById('chapters').innerHTML=d.chapters.map(c=>`<div class="chapter"><h3>📖 ${c.number}. ${c.title}</h3><p>${c.content?.substring(0,200)}...</p></div>`).join('');
                document.getElementById('result').style.display='block';
            }catch(e){alert('خطأ: '+e.message)}
            finally{btn.disabled=false;document.getElementById('loading').style.display='none'}
        }
    </script>
</body>
</html>
